services:
  - type: web
    name: nyx-api-server
    runtime: python
    buildCommand: cd NyxApp/src && pip install -r requirements.txt
    startCommand: cd NyxApp/src && python3 api_server.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PORT
        value: 10000
