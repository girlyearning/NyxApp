services:
  - type: web
    name: nyx-api-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 api_server.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://nyxapp.lovable.app
      - key: PORT
        value: 10000